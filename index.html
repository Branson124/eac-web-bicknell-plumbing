<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#151515" />
    <title>Contractor Site</title>
    <meta id="meta-description" name="description" content="" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <script type="module" crossorigin src="/assets/index-7Gtf21ca.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-7sOouAmP.css">
  </head>
  <body>
    <!-- 1 — Top Bar -->
    <div id="top-bar">
      <span id="top-bar-area"></span>
      <div class="top-bar-right">
        <span id="top-bar-hours"></span>
        <a id="top-bar-phone" class="top-bar-phone-btn"></a>
      </div>
    </div>

    <!-- 2 — Nav -->
    <nav id="main-nav">
      <div class="nav-logo">
        <img id="nav-logo-img" alt="" />
        <div id="nav-logo-text" class="nav-logo-text">
          <div id="nav-logo-initial" class="nav-logo-initial"></div>
          <div class="nav-name-block">
            <div id="nav-business-name"></div>
            <div id="nav-trade-label"></div>
          </div>
        </div>
      </div>
      <div class="nav-links">
        <a href="#services">Services</a>
        <a href="#about">About</a>
        <a href="#reviews" id="nav-reviews-link">Reviews</a>
        <a href="#faq">FAQ</a>
        <a id="nav-phone-link" class="nav-phone"></a>
        <a href="#contact" class="btn-nav">Free Quote</a>
      </div>
    </nav>

    <!-- 3 — Hero -->
    <section id="hero" class="hero">
      <div class="hero-grid">
        <div class="hero-inner">
          <div id="hero-badge" class="hero-badge"></div>
          <h1 id="hero-h1"></h1>
          <p id="hero-sub" class="hero-sub"></p>
          <div class="hero-btns">
            <a id="hero-call-btn" class="btn-primary"></a>
            <a href="#contact" class="btn-ghost" id="hero-quote-btn"></a>
          </div>
          <div id="hero-trust" class="hero-trust"></div>
        </div>
        <div class="hero-photo">
          <img id="hero-photo-img" alt="" />
        </div>
      </div>
    </section>

    <!-- 4 — Trust Strip -->
    <div id="trust-strip" class="trust-strip"></div>

    <!-- 5 — Services -->
    <section id="services" class="section-white">
      <div class="section-inner">
        <div class="sec-label" id="services-label">What We Do</div>
        <h2 id="services-h2"></h2>
        <div id="services-grid" class="services-grid"></div>
      </div>
    </section>

    <!-- 6 — About -->
    <section id="about" class="section-alt">
      <div class="section-inner about-grid two-col">
        <div class="about-photo-wrap">
          <img id="about-photo" src="/about.jpg" alt="" />
        </div>
        <div class="about-text">
          <div class="sec-label">About Us</div>
          <h2 id="about-h2"></h2>
          <div id="about-body" class="about-body"></div>
          <div id="stats-row" class="stats-row"></div>
        </div>
      </div>
    </section>

    <!-- 7 — Reviews -->
    <section id="reviews" class="section-white">
      <div class="section-inner">
        <div class="sec-label">Customer Reviews</div>
        <h2 id="reviews-h2"></h2>
        <div id="reviews-summary" class="reviews-summary"></div>
        <div id="reviews-grid" class="reviews-grid"></div>
        <div id="reviews-cta" class="reviews-cta"></div>
      </div>
    </section>

    <!-- 8 — FAQ -->
    <section id="faq" class="section-alt">
      <div class="section-inner faq-inner">
        <div class="sec-label">FAQ</div>
        <h2>Questions We Get All the Time</h2>
        <div id="faq-list"></div>
      </div>
    </section>

    <!-- 9 — Contact -->
    <section id="contact" class="contact-section">
      <div class="contact-grid section-inner">
        <div class="contact-info">
          <div class="sec-label contact-label">Get in Touch</div>
          <h2 id="contact-h2"></h2>
          <p id="contact-sub" class="contact-sub"></p>
          <a id="contact-phone-big" class="contact-phone-big"></a>
          <div id="contact-details"></div>
        </div>
        <div class="contact-form-wrap">
          <div class="contact-form-title">Send a Message</div>
          <div id="contact-form">
            <label class="form-label" for="f-name">Your Name</label>
            <input type="text" id="f-name" class="form-input" placeholder="First Last" />
            <label class="form-label" for="f-phone">Phone Number</label>
            <input type="tel" id="f-phone" class="form-input" placeholder="" />
            <label class="form-label" for="f-service">What Do You Need?</label>
            <input type="text" id="f-service" class="form-input" placeholder="" />
            <label class="form-label" for="f-message">Message</label>
            <textarea id="f-message" class="form-input form-textarea" rows="3" placeholder="Any details about your issue…"></textarea>
            <div id="form-submit" class="form-submit-btn" role="button" tabindex="0">Send Message →</div>
            <div class="form-note">For emergencies, call directly — we answer 24/7.</div>
          </div>
        </div>
      </div>
    </section>

    <!-- 10 — Footer -->
    <footer id="main-footer">
      <div class="footer-inner section-inner">
        <div id="footer-nap" class="footer-nap"></div>
        <nav class="footer-nav">
          <a href="#services">Services</a>
          <a href="#about">About</a>
          <a href="#reviews" id="footer-reviews-link">Reviews</a>
          <a href="#faq">FAQ</a>
          <a href="#contact">Contact</a>
        </nav>
        <div id="footer-social" class="footer-social"></div>
        <div id="footer-legal" class="footer-legal"></div>
      </div>
    </footer>

  </body>
</html>
